<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProTrader Sovereign | برو تريد المتكامل</title>
    <style>
        :root { --gold: #FFD700; --bg: #050505; --card: #121212; --text: #e0e0e0; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', Arial; margin: 0; padding: 0; overflow: hidden; }
        
        /* زر الرجوع العالمي */
        #back-btn { 
            position: fixed; top: 15px; right: 15px; background: var(--gold); color: black; 
            padding: 5px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; 
            display: none; z-index: 3000; box-shadow: 0 0 10px rgba(255,215,0,0.3);
        }

        /* الشاشات */
        .screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .active-screen { display: block; }

        /* شاشة الدخول */
        .auth-card { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--gold); text-align: center; margin-top: 50px; }
        
        /* القائمة الرئيسية */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
        .menu-item { background: var(--card); border: 1px solid #333; padding: 25px 10px; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.3s; }
        .menu-item:active { transform: scale(0.95); border-color: var(--gold); }
        .menu-item i { display: block; font-size: 2rem; margin-bottom: 10px; }

        /* الأزرار والمدخلات */
        input { width: 100%; padding: 12px; margin: 10px 0; background: #1e1e1e; border: 1px solid #333; color: white; border-radius: 10px; box-sizing: border-box; }
        .btn-gold { width: 100%; background: var(--gold); color: black; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1rem; }

        /* التواقيت */
        .time-bar { display: flex; justify-content: space-around; margin-bottom: 15px; background: #1a1a1a; padding: 10px; border-radius: 10px; }
        .t-btn { background: none; border: 1px solid #444; color: var(--gold); padding: 5px 12px; border-radius: 5px; font-size: 0.8rem; }
        .t-btn.active { background: var(--gold); color: black; }

        .chart-box { height: 250px; background: #000; border: 1px solid #222; border-radius: 15px; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .status-text { color: #4CAF50; animation: flash 1.5s infinite; }
        @keyframes flash { 50% { opacity: 0.4; } }
    </style>
</head>
<body>

    <div id="back-btn" onclick="goHome()">← رجوع</div>

    <div id="screen-auth" class="screen active-screen">
        <div class="auth-card">
            <h1 style="color: var(--gold);">PRO TRADER</h1>
            <p>سجل دخولك للبدء</p>
            <input type="text" id="user" placeholder="اسم المستخدم">
            <input type="password" id="pass" placeholder="كلمة المرور">
            <button class="btn-gold" onclick="login()">دخول للمنصة</button>
            <p style="font-size: 0.8rem; margin-top: 20px; color: #888;">أو قم بإنشاء حساب جديد</p>
        </div>
    </div>

    <div id="screen-home" class="screen">
        <header style="text-align: center; padding: 20px;">
            <h2 style="margin:0;">لوحة التحكم</h2>
            <small style="color:var(--gold);">مرحباً بك في برو تريد VIP</small>
        </header>
        <div class="menu-grid">
            <div class="menu-item" onclick="showScreen('screen-chart')">📊<br>حركة السوق</div>
            <div class="menu-item" onclick="showScreen('screen-calc')">🧮<br>الحاسبة</div>
            <div class="menu-item" onclick="showScreen('screen-sig')">📢<br>التوصيات</div>
            <div class="menu-item" onclick="showScreen('screen-contact')">📞<br>الدعم</div>
        </div>
    </div>

    <div id="screen-chart" class="screen">
        <h2>تحليل الشموع</h2>
        <div class="time-bar">
            <button class="t-btn active" onclick="updateT(this, '1m')">1m</button>
            <button class="t-btn" onclick="updateT(this, '5m')">5m</button>
            <button class="t-btn" onclick="updateT(this, '15m')">15m</button>
            <button class="t-btn" onclick="updateT(this, '1h')">1h</button>
        </div>
        <div class="chart-box">
            <div class="status-text" id="chart-info">تحليل مباشر: 1m</div>
            <div style="font-size: 0.7rem; color: #444; margin-top: 10px;">XAUUSD REAL-TIME FEED</div>
        </div>
    </div>

    <div id="screen-calc" class="screen">
        <h2>حاسبة المخاطرة</h2>
        <div class="auth-card">
            <input type="number" id="balance" placeholder="رأس المال $">
            <input type="number" id="risk" placeholder="المخاطرة %">
            <div id="calc-res" style="color: var(--gold); margin: 15px 0; font-weight: bold;">--</div>
        </div>
    </div>

    <div id="screen-contact" class="screen">
        <h2>تواصل مباشر</h2>
        <a href="https://t.me/YOUR_USER" class="btn-gold" style="display: block; text-align: center; text-decoration: none; margin-bottom: 10px;">تليجرام</a>
        <a href="https://wa.me/YOUR_PHONE" class="btn-gold" style="display: block; text-align: center; text-decoration: none; background: #25D366;">واتساب</a>
    </div>

    <script>
        // نظام التنقل
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(screenId).classList.add('active-screen');
            document.getElementById('back-btn').style.display = (screenId === 'screen-home' || screenId === 'screen-auth') ? 'none' : 'block';
        }

        function goHome() { showScreen('screen-home'); }

        function login() {
            if(document.getElementById('user').value !== "" && document.getElementById('pass').value !== "") {
                showScreen('screen-home');
            } else { alert("الخانات فارغة!"); }
        }

        function updateT(btn, frame) {
            document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('chart-info').innerText = "تحليل مباشر: " + frame;
        }

        // حساب المخاطرة
        document.addEventListener('input', function() {
            const b = parseFloat(document.getElementById('balance').value);
            const r = parseFloat(document.getElementById('risk').value);
            if(b && r) {
                document.getElementById('calc-res').innerText = "مبلغ المخاطرة: $" + (b * r / 100).toFixed(2);
            }
        });
    </script>
</body>
</html>
