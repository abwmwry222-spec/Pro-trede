<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProTrader Elite | النسخة المحدثة</title>
    <style>
        :root { --gold: #FFD700; --bg: #050505; --card: #121212; --text: #e0e0e0; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        
        #notification {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(30, 30, 30, 0.95); border: 1px solid var(--gold);
            padding: 12px 25px; border-radius: 30px; display: none; z-index: 5000;
            box-shadow: 0 5px 20px rgba(255,215,0,0.2); font-size: 0.9rem; color: var(--gold);
        }

        #back-btn { 
            position: fixed; top: 15px; right: 15px; background: var(--gold); color: black; 
            padding: 6px 18px; border-radius: 20px; font-weight: bold; cursor: pointer; 
            display: none; z-index: 3000;
        }

        .screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; padding: 20px; box-sizing: border-box; overflow-y: auto; background: var(--bg); }
        .active-screen { display: block; }

        .auth-card { background: var(--card); padding: 30px; border-radius: 25px; border: 1px solid #222; text-align: center; margin-top: 40px; }
        h1 { color: var(--gold); margin-bottom: 25px; font-size: 2rem; }

        input { 
            width: 100%; padding: 14px; margin: 10px 0; background: #1a1a1a; 
            border: 1px solid #333; color: white; border-radius: 12px; box-sizing: border-box;
            outline: none; font-size: 1rem;
        }

        .btn-gold { 
            width: 100%; background: var(--gold); color: black; border: none; 
            padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; 
            font-size: 1.1rem; margin-top: 15px;
        }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .menu-item { background: var(--card); border: 1px solid #222; padding: 25px 10px; border-radius: 20px; text-align: center; cursor: pointer; }
    </style>
</head>
<body>

    <div id="notification"></div>
    <div id="back-btn" onclick="goHome()">← رجوع</div>

    <div id="screen-auth" class="screen active-screen">
        <div class="auth-card">
            <h1>PRO TRADER</h1>
            <p style="color: #888;">تسجيل الدخول للمحترفين</p>
            <input type="email" id="login-email" placeholder="البريد الإلكتروني">
            <input type="password" id="login-pass" placeholder="كلمة المرور">
            <button class="btn-gold" onclick="handleLogin()">دخول</button>
            <p style="font-size: 0.9rem; margin-top: 25px;">
                ليس لديك حساب؟ <span onclick="showScreen('screen-signup')" style="color: var(--gold); cursor: pointer; text-decoration: underline;">إنشاء حساب جديد</span>
            </p>
        </div>
    </div>

    <div id="screen-signup" class="screen">
        <div class="auth-card">
            <h1>عضوية جديدة</h1>
            <input type="text" placeholder="الاسم الكامل">
            <input type="email" id="reg-email" placeholder="البريد الإلكتروني الجديد">
            <input type="password" id="reg-pass" placeholder="كلمة المرور">
            <button class="btn-gold" onclick="handleSignup()">تأكيد التسجيل</button>
            <p style="margin-top: 20px;" onclick="showScreen('screen-auth')">بالفعل لدي حساب؟ <span style="color: var(--gold);">دخول</span></p>
        </div>
    </div>

    <div id="screen-home" class="screen">
        <header style="text-align: center; padding: 20px;">
            <h1 style="font-size: 1.5rem;">لوحة التحكم</h1>
            <div style="color: #4CAF50; font-size: 0.8rem;">● النظام متصل وجاهز</div>
        </header>
        <div class="menu-grid">
            <div class="menu-item" onclick="showScreen('screen-chart')">📉<br>السوق</div>
            <div class="menu-item" onclick="showScreen('screen-calc')">🧮<br>الحاسبة</div>
            <div class="menu-item" onclick="showScreen('screen-sig')">🔔<br>التوصيات</div>
            <div class="menu-item" onclick="showScreen('screen-contact')">🎧<br>الدعم</div>
        </div>
    </div>

    <div id="screen-chart" class="screen"><h2>حركة السوق</h2><p>بيانات حية...</p></div>
    <div id="screen-calc" class="screen">
        <h2>حاسبة المخاطرة</h2>
        <input type="number" id="balance" placeholder="الرصيد $">
        <input type="number" id="risk" placeholder="المخاطرة %">
        <h2 id="calc-res" style="text-align:center; color:var(--gold);">$0.00</h2>
    </div>
    <div id="screen-contact" class="screen">
        <h2>تواصل معنا</h2>
        <a href="https://t.me/YOUR_USER" class="btn-gold" style="display:block; text-align:center; text-decoration:none;">Telegram</a>
    </div>

    <script>
        function notify(msg) {
            const n = document.getElementById('notification');
            n.innerText = msg; n.style.display = 'block';
            setTimeout(() => { n.style.display = 'none'; }, 3000);
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
            document.getElementById('back-btn').style.display = (id === 'screen-home' || id === 'screen-auth' || id === 'screen-signup') ? 'none' : 'block';
        }

        function goHome() { showScreen('screen-home'); }

        function handleLogin() {
            const e = document.getElementById('login-email').value;
            if(e.includes('@')) {
                notify("تم الدخول بنجاح");
                showScreen('screen-home');
            } else {
                notify("خطأ: يرجى كتابة إيميل صحيح يحتوي على @");
            }
        }

        function handleSignup() {
            const e = document.getElementById('reg-email').value;
            if(e.includes('@')) {
                notify("تم إنشاء حسابك! سجل دخولك الآن");
                showScreen('screen-auth');
            } else {
                notify("يرجى إدخال بريد إلكتروني صالح");
            }
        }

        document.addEventListener('input', () => {
            const b = parseFloat(document.getElementById('balance').value);
            const r = parseFloat(document.getElementById('risk').value);
            if(b && r) document.getElementById('calc-res').innerText = "$" + (b * r / 100).toFixed(2);
        });
    </script>
</body>
</html>
